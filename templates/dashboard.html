<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VTI SDLC Dashboard</title>
<style>
/* ── Design tokens (ckm-design-system) ─────────────────── */
:root {
  --bg:         #F9FAFB;
  --card:       #FFFFFF;
  --fg:         #111827;
  --fg-muted:   #6B7280;
  --border:     #E5E7EB;
  --hover:      #F3F4F6;
  --surface:    #F3F4F6;
  --primary:    #2563EB;
  --primary-h:  #1D4ED8;
  --success:    #16A34A;
  --warning:    #EAB308;
  --danger:     #DC2626;
  --purple:     #7C3AED;
  --ring:       #3B82F6;
  --mono:       ui-monospace, "JetBrains Mono", "SF Mono", Consolas, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:       #111827;
    --card:     #1F2937;
    --fg:       #F9FAFB;
    --fg-muted: #9CA3AF;
    --border:   #374151;
    --hover:    #1F2937;
    --surface:  #1F2937;
  }
}

/* ── Reset & base ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
       background: var(--bg); color: var(--fg); min-height: 100vh; }

/* ── Layout ─────────────────────────────────────────────── */
.page          { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
.section       { margin-top: 28px; }
.section-title { font-size: 13px; font-weight: 700; text-transform: uppercase;
                 letter-spacing: 0.06em; color: var(--fg-muted); margin-bottom: 12px; }

/* ── Header ─────────────────────────────────────────────── */
header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
         padding-bottom: 16px; border-bottom: 1px solid var(--border); }
header h1  { font-size: 18px; font-weight: 700; flex: 0 0 auto; }
.gen-info  { font-size: 12px; color: var(--fg-muted); flex: 1; }

header .search-wrap { display: flex; align-items: center; margin-left: auto; }
.search-input { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
                background: var(--card); color: var(--fg); font-size: 13px; width: 220px;
                outline: none; transition: border-color .15s; }
.search-input:focus { border-color: var(--ring); }

/* ── Stat cards ─────────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media (max-width: 700px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
             padding: 14px 16px; }
.stat-val  { font-size: 26px; font-weight: 800; font-family: var(--mono); line-height: 1; }
.stat-label{ font-size: 11px; color: var(--fg-muted); margin-top: 4px; }
.stat-sub  { font-size: 11px; color: var(--fg-muted); margin-top: 2px; }

/* ── Kanban ─────────────────────────────────────────────── */
.kanban     { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
@media (max-width: 800px) { .kanban { grid-template-columns: repeat(2, 1fr); } }
.lane       { background: var(--surface); border-radius: 10px; padding: 10px; }
.lane-header{ display: flex; justify-content: space-between; align-items: center;
              margin-bottom: 8px; }
.lane-name  { font-size: 11px; font-weight: 700; text-transform: uppercase;
              letter-spacing: .05em; color: var(--fg-muted); }
.lane-count { background: var(--border); border-radius: 10px; padding: 0 6px;
              font-size: 11px; font-weight: 600; font-family: var(--mono); }
.card       { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
              padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
              transition: border-color .15s, box-shadow .15s; }
.card:hover { border-color: var(--primary); box-shadow: 0 1px 6px rgba(37,99,235,.12); }
.card-id    { font-size: 11px; color: var(--fg-muted); font-family: var(--mono); margin-bottom: 3px; }
.card-title { font-size: 13px; font-weight: 500; word-break: break-word; }
.card-meta  { margin-top: 7px; display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.card-files { font-size: 11px; color: var(--fg-muted); }
.card-detail{ display: none; margin-top: 8px; padding-top: 8px;
              border-top: 1px solid var(--border); font-size: 12px; }
.card.open .card-detail { display: block; }
.card-detail a { color: var(--primary); word-break: break-all; text-decoration: none; }
.card-detail a:hover { text-decoration: underline; }
.detail-row { color: var(--fg-muted); margin-top: 4px; }

/* ── Pills ───────────────────────────────────────────────── */
.pill       { display: inline-block; padding: 1px 7px; border-radius: 10px;
              font-size: 11px; font-weight: 600; white-space: nowrap; }
.p-gray     { background: var(--surface); color: var(--fg-muted); }
.p-blue     { background: #dbeafe; color: #1e40af; }
.p-green    { background: #dcfce7; color: #166534; }
.p-yellow   { background: #fef3c7; color: #92400e; }
.p-red      { background: #fee2e2; color: #991b1b; }
.p-purple   { background: #ede9fe; color: #6b21a8; }
@media (prefers-color-scheme: dark) {
  .p-gray   { background: #374151; color: #9CA3AF; }
  .p-blue   { background: #1e3a5f; color: #93c5fd; }
  .p-green  { background: #14532d; color: #86efac; }
  .p-yellow { background: #451a03; color: #fcd34d; }
  .p-red    { background: #450a0a; color: #fca5a5; }
  .p-purple { background: #3b0764; color: #d8b4fe; }
}

/* ── Tables ──────────────────────────────────────────────── */
.toolbar    { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-input { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
                background: var(--card); color: var(--fg); font-size: 13px; flex: 1;
                min-width: 180px; outline: none; }
.filter-input:focus { border-color: var(--ring); }
.tbl-wrap   { overflow-x: auto; }
table       { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td      { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left;
              vertical-align: middle; }
th          { background: var(--surface); font-size: 12px; font-weight: 700;
              cursor: pointer; user-select: none; white-space: nowrap; }
th[data-sortable]::after { content: " ⇅"; color: var(--fg-muted); font-size: 10px; }
th.sort-asc::after  { content: " ↑"; color: var(--primary); }
th.sort-desc::after { content: " ↓"; color: var(--primary); }
tr:hover    { background: var(--hover); }
.empty-row td { color: var(--fg-muted); font-style: italic; text-align: center; padding: 24px; }
.mono       { font-family: var(--mono); }

/* ── Filter chips ────────────────────────────────────────── */
.chips      { display: flex; gap: 6px; flex-wrap: wrap; }
.chip       { padding: 3px 10px; border: 1px solid var(--border); border-radius: 20px;
              font-size: 12px; cursor: pointer; }
.chip:hover { border-color: var(--primary); }
.chip.active{ background: var(--primary); color: #fff; border-color: var(--primary); }

@media print {
  .search-wrap, .toolbar, .chips { display: none; }
  .card-detail { display: block !important; }
  body { font-size: 12px; }
}
</style>
</head>
<body>
<script>
const DATA = {{EMBEDDED_JSON}};
</script>

<script>
// ── Helpers ────────────────────────────────────────────────

const PHASE_META = {
  empty:     { label: 'Empty',           pill: 'p-red'    },
  discovery: { label: 'Discovery',       pill: 'p-gray'   },
  planning:  { label: 'Planning',        pill: 'p-blue'   },
  dev:       { label: 'Dev · Pending PR',pill: 'p-yellow' },
  review:    { label: 'In Review',       pill: 'p-purple' },
  qa:        { label: 'QA / Done',       pill: 'p-green'  },
};

const RISK_META = {
  tiny:        { pill: 'p-green',  label: 'tiny' },
  normal:      { pill: 'p-blue',   label: 'normal' },
  'high-risk': { pill: 'p-red',    label: 'high-risk' },
};

function pill(cls, text) {
  return `<span class="pill ${cls}">${text}</span>`;
}

function phasePill(p) {
  const m = PHASE_META[p] || { label: p, pill: 'p-gray' };
  return pill(m.pill, m.label);
}

function riskPill(r) {
  if (!r) return pill('p-gray', '—');
  const m = RISK_META[r] || { pill: 'p-gray', label: r };
  return pill(m.pill, m.label);
}

function fmtDate(iso) {
  if (!iso) return '—';
  return iso.replace('T', ' ').slice(0, 16) + ' JST';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Stats ──────────────────────────────────────────────────

function renderStats() {
  const { tasks, backlog } = DATA;
  const total    = tasks.length;
  const done     = tasks.filter(t => t.phase === 'qa').length;
  const inFlight = tasks.filter(t => !['empty','qa'].includes(t.phase)).length;
  const openIBs  = backlog.filter(b => b.status === 'open').length;

  const cards = [
    { val: total,    label: 'Tasks',        sub: 'all time' },
    { val: inFlight, label: 'In Flight',    sub: 'active tasks' },
    { val: done,     label: 'QA / Done',    sub: 'completed' },
    { val: openIBs,  label: 'Open Backlog', sub: 'items' },
  ];

  document.getElementById('stats-row').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="stat-val mono">${esc(c.val)}</div>
      <div class="stat-label">${esc(c.label)}</div>
      <div class="stat-sub">${esc(c.sub)}</div>
    </div>`).join('');
}

// ── Kanban ─────────────────────────────────────────────────

function renderKanban() {
  const lanes = ['empty','discovery','planning','dev','review','qa'];
  document.getElementById('kanban').innerHTML = lanes.map(phase => {
    const ts = DATA.tasks.filter(t => t.phase === phase);
    const cards = ts.map(t => {
      const fileLinks = t.files.map(f => `<a href="../docs/tasks/${esc(t.id)}/${esc(f)}">${esc(f)}</a>`).join('<br>');
      return `
        <div class="card" data-id="${esc(t.id)}" onclick="this.classList.toggle('open')">
          <div class="card-id">${esc(t.id)}</div>
          <div class="card-title">${esc(t.title)}</div>
          <div class="card-meta">${riskPill(t.risk)} <span class="card-files">${t.files.length} file${t.files.length !== 1 ? 's' : ''}</span></div>
          <div class="card-detail">
            <div>${fileLinks || 'No files'}</div>
            <div class="detail-row">Modified: ${esc(fmtDate(t.lastMod))}</div>
          </div>
        </div>`;
    }).join('');
    const m = PHASE_META[phase] || {};
    return `
      <div class="lane">
        <div class="lane-header">
          <span class="lane-name">${esc(m.label || phase)}</span>
          <span class="lane-count">${ts.length}</span>
        </div>
        ${cards || '<div style="font-size:12px;color:var(--fg-muted);padding:4px 0">—</div>'}
      </div>`;
  }).join('');
}

// ── Health table ────────────────────────────────────────────

let _healthFilterPhase = 'all';
let _healthFilterRisk  = 'all';
let _healthSearch = '';

function renderHealth() {
  const tbody = document.querySelector('#health-table tbody');
  let rows = DATA.tasks;
  if (_healthFilterPhase !== 'all') rows = rows.filter(t => t.phase === _healthFilterPhase);
  if (_healthFilterRisk  !== 'all') rows = rows.filter(t => t.risk  === _healthFilterRisk);
  if (_healthSearch) rows = rows.filter(t =>
    t.id.toLowerCase().includes(_healthSearch) || t.title.toLowerCase().includes(_healthSearch));

  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No tasks match filter</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(t => `
    <tr>
      <td class="mono"><strong>${esc(t.id)}</strong></td>
      <td>${phasePill(t.phase)}</td>
      <td>${riskPill(t.risk)}</td>
      <td class="mono">${t.files.length}</td>
      <td class="mono" style="font-size:11px;color:var(--fg-muted)">${esc(fmtDate(t.lastMod))}</td>
    </tr>`).join('');
}

// ── Backlog table ───────────────────────────────────────────

let _backlogFilter = 'all';
let _backlogSearch = '';

function renderBacklog() {
  const tbody = document.querySelector('#backlog-table tbody');
  let rows = DATA.backlog;
  if (_backlogFilter === 'open') rows = rows.filter(b => b.status === 'open');
  if (_backlogFilter === 'done') rows = rows.filter(b => b.status !== 'open');
  if (_backlogSearch) rows = rows.filter(b =>
    (b.id + b.source + b.friction + b.fix).toLowerCase().includes(_backlogSearch));

  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No backlog items</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(b => {
    const isDone = b.status !== 'open';
    const sp = isDone ? pill('p-green', 'done') : pill('p-yellow', 'open');
    return `<tr>
      <td class="mono">${esc(b.id)}</td>
      <td>${esc(b.source)}</td>
      <td>${esc(b.friction)}</td>
      <td style="font-size:12px">${esc(b.fix)}</td>
      <td>${sp}</td>
    </tr>`;
  }).join('');
}

// ── Sortable tables ─────────────────────────────────────────

function initSortable() {
  document.querySelectorAll('th[data-sortable]').forEach(th => {
    th.addEventListener('click', () => {
      const table = th.closest('table');
      const tbody = table.querySelector('tbody');
      const idx   = Array.from(th.parentNode.children).indexOf(th);
      const type  = th.dataset.type || 'string';
      const asc   = !th.classList.contains('sort-asc');
      table.querySelectorAll('th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
      th.classList.add(asc ? 'sort-asc' : 'sort-desc');
      Array.from(tbody.querySelectorAll('tr'))
        .sort((a, b) => {
          const av = a.children[idx]?.textContent.trim() ?? '';
          const bv = b.children[idx]?.textContent.trim() ?? '';
          const cmp = type === 'number' ? parseFloat(av) - parseFloat(bv) : av.localeCompare(bv, 'vi');
          return asc ? cmp : -cmp;
        })
        .forEach(r => tbody.appendChild(r));
    });
  });
}

// ── Global search ───────────────────────────────────────────

function initGlobalSearch() {
  document.getElementById('global-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.card').forEach(card => {
      const id = card.dataset.id || '';
      card.style.opacity = (!q || id.toLowerCase().includes(q) ||
        card.querySelector('.card-title')?.textContent.toLowerCase().includes(q)) ? '' : '0.3';
    });
  });
}

// ── Boot ────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('gen-time').textContent = DATA.generatedAt;

  renderStats();
  renderKanban();
  renderHealth();
  renderBacklog();
  initSortable();
  initGlobalSearch();

  document.querySelectorAll('.phase-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.phase-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      _healthFilterPhase = chip.dataset.phase;
      renderHealth();
    });
  });

  document.querySelectorAll('.risk-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.risk-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      _healthFilterRisk = chip.dataset.risk;
      renderHealth();
    });
  });

  document.getElementById('health-search').addEventListener('input', e => {
    _healthSearch = e.target.value.toLowerCase().trim();
    renderHealth();
  });

  document.querySelectorAll('.backlog-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.backlog-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      _backlogFilter = chip.dataset.filter;
      renderBacklog();
    });
  });

  document.getElementById('backlog-search').addEventListener('input', e => {
    _backlogSearch = e.target.value.toLowerCase().trim();
    renderBacklog();
  });
});
</script>

<!-- ── Page shell ──────────────────────────────────────── -->
<div class="page">

  <header>
    <h1>VTI SDLC Dashboard</h1>
    <span class="gen-info">Generated: <span id="gen-time"></span></span>
    <div class="search-wrap">
      <input type="search" class="search-input" id="global-search" placeholder="Search tasks…" aria-label="Search tasks">
    </div>
  </header>

  <!-- Stats -->
  <div class="section">
    <div class="section-title">Overview</div>
    <div class="stats-row" id="stats-row"></div>
  </div>

  <!-- Kanban -->
  <div class="section">
    <div class="section-title">Task Progress</div>
    <div class="kanban" id="kanban"></div>
  </div>

  <!-- Sprint health table -->
  <div class="section">
    <div class="section-title">Sprint Health</div>
    <div class="toolbar">
      <input type="search" class="filter-input" id="health-search" placeholder="Search…">
      <div class="chips">
        <span class="chip phase-chip active" data-phase="all">All phases</span>
        <span class="chip phase-chip" data-phase="discovery">Discovery</span>
        <span class="chip phase-chip" data-phase="planning">Planning</span>
        <span class="chip phase-chip" data-phase="dev">Dev</span>
        <span class="chip phase-chip" data-phase="qa">Done</span>
      </div>
      <div class="chips">
        <span class="chip risk-chip active" data-risk="all">All risk</span>
        <span class="chip risk-chip" data-risk="tiny">Tiny</span>
        <span class="chip risk-chip" data-risk="normal">Normal</span>
        <span class="chip risk-chip" data-risk="high-risk">High-risk</span>
      </div>
    </div>
    <div class="tbl-wrap">
      <table id="health-table">
        <thead><tr>
          <th data-sortable>Task ID</th>
          <th data-sortable>Phase</th>
          <th data-sortable>Risk</th>
          <th data-sortable data-type="number">Files</th>
          <th data-sortable>Last Modified</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Improvement backlog -->
  <div class="section" style="margin-bottom: 48px">
    <div class="section-title">Improvement Backlog</div>
    <div class="toolbar">
      <input type="search" class="filter-input" id="backlog-search" placeholder="Search backlog…">
      <div class="chips">
        <span class="chip backlog-chip active" data-filter="all">All</span>
        <span class="chip backlog-chip" data-filter="open">Open</span>
        <span class="chip backlog-chip" data-filter="done">Done</span>
      </div>
    </div>
    <div class="tbl-wrap">
      <table id="backlog-table">
        <thead><tr>
          <th data-sortable>ID</th>
          <th data-sortable>Found in</th>
          <th data-sortable>Friction</th>
          <th>Proposed Fix</th>
          <th data-sortable>Status</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div><!-- /page -->
</body>
</html>
