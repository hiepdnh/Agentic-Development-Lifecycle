# lychee link checker config
# https://lychee.cli.rs/

# Accept these status codes as valid
accept = [200, 206, 429]

# Network timeout (seconds)
timeout = 20

# Max number of concurrent network requests
max_concurrency = 16

# Retry failed checks (transient network issues)
max_retries = 2
retry_wait_time = 2

# Exclude common false-positives and unstable hosts
exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://example\\.com",
  "^https?://claude\\.ai/code/",
  # GitHub anchor links to private/auto-generated content
  "^https://github\\.com/.+/(issues|pull|discussions)/new",
]

# Don't check mailto / tel
exclude_mail = true

# Skip anchor-only links — many MD files reference TOC anchors generated by GitHub
# that lychee can't resolve without parsing the rendered HTML.
include_fragments = false
