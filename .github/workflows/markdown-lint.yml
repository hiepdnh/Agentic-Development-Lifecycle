name: Markdown Lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - 'lychee.toml'
      - '.github/workflows/markdown-lint.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: markdown-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !node_modules
            !docs/tasks/**
            !CHANGELOG.md

  linkcheck:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --config lychee.toml
            --exclude-path docs/tasks
            --exclude-path node_modules
            '**/*.md'
          fail: true
