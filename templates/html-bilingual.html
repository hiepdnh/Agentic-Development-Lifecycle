<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE_JP}} / {{TITLE_VN}}</title>
<style>
  :root {
    --bg: #fff; --fg: #1a1a1a; --muted: #666;
    --border: #d4d4d4; --accent: #0a4d8c; --hover: #f5f5f5;
    --jp: #fef9f0; --vn: #f0f7ff;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0f0f0f; --fg: #e5e5e5; --muted: #999;
            --border: #2a2a2a; --hover: #1a1a1a;
            --jp: #1f1810; --vn: #101820; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 24px; max-width: 1400px; margin: 0 auto;
         font: 15px/1.7 "Hiragino Sans", "Yu Gothic", "Meiryo",
               system-ui, -apple-system, sans-serif;
         background: var(--bg); color: var(--fg); }
  header { border-bottom: 2px solid var(--accent); padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; }
  h1 .vn { color: var(--muted); font-size: 16px; font-weight: normal; }
  .meta { color: var(--muted); font-size: 13px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
         margin: 12px 0; padding: 12px; border: 1px solid var(--border);
         border-radius: 6px; }
  .col { padding: 12px; border-radius: 4px; position: relative; }
  .col.jp { background: var(--jp); }
  .col.vn { background: var(--vn); }
  .col h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase;
            color: var(--muted); letter-spacing: 0.5px; }
  .col p { margin: 0; white-space: pre-wrap; }
  .copy-btn { position: absolute; top: 8px; right: 8px;
              padding: 2px 8px; font-size: 11px; border: 1px solid var(--border);
              background: var(--bg); color: var(--fg); border-radius: 4px;
              cursor: pointer; opacity: 0; transition: opacity 0.15s; }
  .row:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: var(--hover); }
  .glossary { border-bottom: 1px dotted var(--accent); cursor: help;
              position: relative; }
  .glossary:hover::after { content: attr(data-tooltip);
              position: absolute; bottom: 100%; left: 0; padding: 6px 10px;
              background: var(--fg); color: var(--bg); font-size: 12px;
              border-radius: 4px; white-space: nowrap; z-index: 10; }
  @media (max-width: 700px) {
    .row { grid-template-columns: 1fr; }
  }
  @media print {
    body { padding: 0; max-width: none; font-size: 12pt; }
    .row { page-break-inside: avoid; border: 1px solid #888;
           background: white !important; -webkit-print-color-adjust: exact; }
    .copy-btn { display: none; }
    .col.jp { background: #fdf6e3 !important; }
    .col.vn { background: #f0f7ff !important; }
  }
</style>
</head>
<body>

<header>
  <h1>{{TITLE_JP}} <span class="vn">/ {{TITLE_VN}}</span></h1>
  <div class="meta">{{TASK_ID}} · {{TIMESTAMP_JST}} JST · 成果物 (Deliverable)</div>
</header>

<!-- CONTENT -->
<!--
  Pattern cho mỗi mục song ngữ:

  <div class="row">
    <div class="col jp">
      <h3>日本語</h3>
      <p>ユーザーは<span class="glossary" data-tooltip="認証 = xác thực">認証</span>後にダッシュボードへ遷移する。</p>
      <button class="copy-btn" data-copy-parent>Copy JP</button>
    </div>
    <div class="col vn">
      <h3>Tiếng Việt</h3>
      <p>Người dùng chuyển sang dashboard sau khi xác thực.</p>
      <button class="copy-btn" data-copy-parent>Copy VN</button>
    </div>
  </div>

  Glossary (`<span class="glossary" data-tooltip="JP=VN">`) hiện tooltip khi hover.
-->

<script>
document.querySelectorAll('button[data-copy-parent]').forEach(btn => {
  btn.addEventListener('click', async () => {
    const text = btn.parentElement.querySelector('p').textContent.trim();
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = orig, 1200);
  });
});
</script>
</body>
</html>
